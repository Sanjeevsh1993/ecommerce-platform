name: CI/CD — Build · Test · Publish

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
#   push to master/main  → test + build + push Docker images to GHCR
#   pull_request         → test + build + Docker build-only (no push)
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  JAVA_VERSION: '17'
  REGISTRY: ghcr.io
  # Image prefix — images will be: ghcr.io/<owner>/ecommerce-platform/<service>
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/ecommerce-platform

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — Unit Tests
  # Runs all 142 tests across 6 modules (H2 in-memory DB — no external services needed)
  # ───────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run all tests
        run: mvn test --no-transfer-progress

      - name: Upload Surefire test reports
        if: always()   # upload even if tests fail, so we can see the results
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/target/surefire-reports/*.xml'
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build & Package JARs
  # Runs after tests pass. Produces fat JARs for each service and uploads them
  # as a workflow artifact so the docker job can use them without rebuilding.
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: Build Artifacts
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Package all modules (skip tests — already passed)
        run: mvn package -DskipTests --no-transfer-progress

      - name: Upload service JARs
        uses: actions/upload-artifact@v4
        with:
          name: service-jars
          # Preserve directory structure so docker job can reference target/*.jar
          # Spring Boot creates only one .jar (the .jar.original is not a .jar file)
          path: |
            auth-service/target/*.jar
            user-service/target/*.jar
            order-service/target/*.jar
            catalog-service/target/*.jar
            api-gateway/target/*.jar
          retention-days: 7
          if-no-files-found: error

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — Build & Push Docker Images
  # Matrix over all 5 services. Each service uses its own Dockerfile and JAR.
  #
  # On push to master/main → build + push to GHCR
  #   tags: latest, sha-<short-sha>
  # On pull_request        → build only (no push) to validate Dockerfile
  # ───────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker / ${{ matrix.service }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # Required to push to GHCR

    strategy:
      fail-fast: false  # If one service fails, still build the others
      matrix:
        include:
          - service: auth-service
            port: 8081
          - service: user-service
            port: 8082
          - service: order-service
            port: 8083
          - service: catalog-service
            port: 8084
          - service: api-gateway
            port: 8080

    steps:
      - name: Checkout (needed for Dockerfiles)
        uses: actions/checkout@v4

      - name: Download service JARs
        uses: actions/download-artifact@v4
        with:
          name: service-jars
          # Downloads preserve directory structure:
          # auth-service/target/*.jar, user-service/target/*.jar, etc.

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            # sha-abc1234 on every push
            type=sha,prefix=sha-,format=short
            # latest only on push to master/main (not on PRs)
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=${{ matrix.service }}
            org.opencontainers.image.description=E-Commerce Platform — ${{ matrix.service }}
            org.opencontainers.image.vendor=Sanjeevsh1993

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # context = service directory (contains Dockerfile + target/*.jar)
          context: ${{ matrix.service }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer caching scoped per service to avoid cross-service cache pollution
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Image digest summary
        if: github.event_name == 'push'
        run: |
          echo "### Docker image pushed" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | \`${{ matrix.service }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | \`${{ env.REGISTRY }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags | \`${{ steps.meta.outputs.tags }}\` |" >> $GITHUB_STEP_SUMMARY
