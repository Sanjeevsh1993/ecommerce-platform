# user-service — Staging environment
# Activate with: --spring.profiles.active=staging
# Required env vars: DB_HOST, DB_USERNAME, DB_PASSWORD

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:staging-mysql}:${DB_PORT:3306}/ecommerce_users?useSSL=true&allowPublicKeyRetrieval=true
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    show-sql: false

management:
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.ecommerce.user: INFO
    org.springframework.security: INFO
