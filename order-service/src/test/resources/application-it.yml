# Integration test profile — TestContainers MySQL
# BC References: BC-013..029

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # URL injected dynamically via @DynamicPropertySource
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  services:
    user-service-url: http://localhost:8082   # mocked in tests via @MockBean

logging:
  level:
    com.ecommerce.order: DEBUG
