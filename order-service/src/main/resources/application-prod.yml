# order-service — Production environment
# Activate with: --spring.profiles.active=prod
# Required env vars: DB_HOST, DB_PORT, DB_USERNAME, DB_PASSWORD, USER_SERVICE_URL

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/ecommerce_orders?useSSL=true&requireSSL=true&allowPublicKeyRetrieval=true
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    show-sql: false

app:
  services:
    user-service-url: ${USER_SERVICE_URL}  # No default — must be explicitly set in prod
    user-service-connect-timeout-ms: 2000
    user-service-read-timeout-ms: 5000     # Stricter in prod

resilience4j:
  circuitbreaker:
    instances:
      user-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3

management:
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: WARN
    com.ecommerce.order: INFO
    org.springframework.security: WARN
  file:
    name: /var/log/ecommerce/order-service.log
