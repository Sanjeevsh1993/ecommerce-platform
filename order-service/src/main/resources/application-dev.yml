# order-service — Development environment
# Activate with: --spring.profiles.active=dev
# Required env vars: DB_HOST, DB_USERNAME, DB_PASSWORD

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:dev-mysql}:${DB_PORT:3306}/ecommerce_orders?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    show-sql: true

app:
  services:
    user-service-url: ${USER_SERVICE_URL:http://dev-user-service:8082}
    user-service-connect-timeout-ms: 5000
    user-service-read-timeout-ms: 15000  # More lenient in dev

resilience4j:
  retry:
    instances:
      user-service:
        max-attempts: 3
        wait-duration: 200ms       # Faster retries in dev for quick feedback
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
  circuitbreaker:
    instances:
      user-service:
        sliding-window-size: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 15s

logging:
  level:
    root: INFO
    com.ecommerce.order: DEBUG
    org.springframework.security: DEBUG
