# BC References: BC-013..029, BC-033, BC-056
# STRANGLER FIG - Phase: 6 - Domain: Order Management

server:
  port: 8083

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce_orders?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: order-service-pool
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

app:
  services:
    user-service-url: ${USER_SERVICE_URL:http://localhost:8082}
    # Timeouts set on the HTTP request factory — Resilience4j TimeLimiter is for async only
    user-service-connect-timeout-ms: 5000
    user-service-read-timeout-ms: 10000

resilience4j:

  # ── Retry ────────────────────────────────────────────────────────────────
  # Outermost decorator: retries before fallback fires.
  # Only retries on transient network/server errors — never on 4xx (client bugs).
  # Ignores CallNotPermittedException so an open circuit stops retries immediately.
  retry:
    instances:
      user-service:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2        # 500ms → 1s → 2s
        retry-exceptions:
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException   # connect/read timeout
          - org.springframework.web.client.HttpServerErrorException  # 5xx from user-service
        ignore-exceptions:
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException  # CB open → stop immediately
          - org.springframework.web.client.HttpClientErrorException          # 4xx → don't retry

  # ── Circuit Breaker ───────────────────────────────────────────────────────
  # Inner decorator: tracks failure rate across all attempts (including retries).
  # No fallbackMethod here — exceptions propagate up to @Retry so retries can happen.
  # When open, throws CallNotPermittedException which @Retry ignores → fallback fires.
  circuitbreaker:
    instances:
      user-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException  # 4xx not a CB failure

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.ecommerce.order: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{correlationId}] %logger{36} - %msg%n"
