# catalog-service — Production environment
# Activate with: --spring.profiles.active=prod
# Required env vars: DB_HOST, DB_PORT, DB_USERNAME, DB_PASSWORD

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/ecommerce_catalog?useSSL=true&requireSSL=true&allowPublicKeyRetrieval=true
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    show-sql: false

management:
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: WARN
    com.ecommerce.catalog: INFO
    org.springframework.security: WARN
  file:
    name: /var/log/ecommerce/catalog-service.log
