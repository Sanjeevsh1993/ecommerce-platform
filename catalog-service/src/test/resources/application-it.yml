# Integration test profile — TestContainers MySQL
# BC References: BC-031, BC-032, BC-053

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # URL injected dynamically via @DynamicPropertySource
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    com.ecommerce.catalog: DEBUG
