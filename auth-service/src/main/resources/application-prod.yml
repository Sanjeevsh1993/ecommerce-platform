# auth-service — Production environment
# Activate with: --spring.profiles.active=prod
# Required env vars: DB_HOST, DB_PORT, DB_USERNAME, DB_PASSWORD, JWT_SECRET

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/ecommerce_auth?useSSL=true&requireSSL=true&allowPublicKeyRetrieval=true
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    show-sql: false

app:
  jwt:
    access-token-expiry-ms: 900000       # 15 min
    refresh-token-expiry-ms: 604800000   # 7 days

management:
  endpoint:
    health:
      show-details: never  # Do not expose internals in production

logging:
  level:
    root: WARN
    com.ecommerce.auth: INFO
    org.springframework.security: WARN
  file:
    name: /var/log/ecommerce/auth-service.log
