# auth-service — Development environment
# Activate with: --spring.profiles.active=dev
# Required env vars: DB_HOST, DB_USERNAME, DB_PASSWORD, JWT_SECRET

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:dev-mysql}:${DB_PORT:3306}/ecommerce_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    show-sql: true

logging:
  level:
    root: INFO
    com.ecommerce.auth: DEBUG
    org.springframework.security: DEBUG
