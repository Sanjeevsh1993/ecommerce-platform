# Integration test profile — overrides datasource with TestContainers MySQL
# BC References: BC-034..042

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # URL injected dynamically via @DynamicPropertySource from MySQLContainer
  jpa:
    hibernate:
      ddl-auto: validate       # Flyway runs migrations first, JPA validates
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: integration-test-secret-key-32-chars-minimum!!
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 604800000
    refresh-cookie-name: refresh_token

logging:
  level:
    com.ecommerce.auth: DEBUG
    org.springframework.security: WARN
