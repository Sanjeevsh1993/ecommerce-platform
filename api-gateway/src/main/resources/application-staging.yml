# api-gateway — Staging environment
# Activate with: --spring.profiles.active=staging
# Service URLs resolved via env vars (AUTH_SERVICE_URL, USER_SERVICE_URL, etc.)
# Required env vars: JWT_SECRET

spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "https://staging.ecommerce.com"
              - "https://staging-admin.ecommerce.com"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers:
              - Authorization
              - Content-Type
              - X-Correlation-ID
            exposed-headers:
              - X-Correlation-ID
            allow-credentials: true
            max-age: 3600
      httpclient:
        connect-timeout: 3000
        response-timeout: 8s

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, gateway, circuitbreakers
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.ecommerce.gateway: INFO
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO
